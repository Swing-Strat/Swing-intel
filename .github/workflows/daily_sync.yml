name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to manually click a button in GitHub to trigger a sync anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    # FIXED: Using the stable open cloud mirror that accepts datacenter connections
    - name: Download Raw Zip File to Disk via Civic Data Mirror
      run: |
        curl -Ssl --fail \
             -L "https://calaccess.download/latest/raw.zip" \
             -o state_data_archive.zip

    - name: Run ETL Pipeline Stream
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: python sync.py
