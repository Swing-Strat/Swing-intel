name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual one-click testing inside GitHub anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    - name: Run Integrated Download and Sync Pipeline
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        BLN_API_KEY: ${{ secrets.BLN_API_KEY }}
      # Python now handles the secure Stanford download and the database ingestion completely
      run: python sync.py
