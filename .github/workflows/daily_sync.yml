name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST / 5:00 AM PDT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to manually click a button in GitHub to trigger a sync anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    # NEW STEP: Let the native system download the file directly to disk using Chrome's profile signature
    - name: Download Raw Zip File to Disk via Curl
      run: |
        curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
             -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
             -L "https://campaignfinance.cdn.sos.ca.gov/rawdata/calaccess_raw_data.zip" \
             -o state_data_archive.zip

    - name: Run ETL Pipeline Stream
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      # We tell Python to process the local file we just downloaded
      run: python sync.py
