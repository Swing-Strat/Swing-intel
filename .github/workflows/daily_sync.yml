name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual one-click testing inside GitHub anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary bln

    - name: Run Integrated Download and Sync Pipeline
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        # The bln client library reads BLN_API_TOKEN specifically (not
        # BLN_API_KEY) — mapping the existing secret name onto the variable
        # name the library actually expects, so nothing needs to change in
        # GitHub's secret settings.
        BLN_API_TOKEN: ${{ secrets.BLN_API_KEY }}
      run: python sync.py
