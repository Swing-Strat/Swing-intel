name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual one-click testing inside GitHub anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # We add 'bln' to the installation list to use Stanford's official python package
    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary bln

    # Stanford's infrastructure lets cloud runners right through the front door
    - name: Download Raw Zip File via Big Local News Mirror
      env:
        BLN_API_KEY: ${{ secrets.BLN_API_KEY }}
      run: |
        curl -Ssl --fail \
             -H "Authorization: Token ${BLN_API_KEY}" \
             -L "https://calaccess.californiacivicdata.org/downloads/latest/clean/calaccess_raw_data.zip" \
             -o state_data_archive.zip
        # Note: If your project token targets a specific BLN Project ID asset directory, 
        # the official "bln" tool can also pull it via command-line dynamically.

    - name: Run ETL Pipeline Stream to Supabase
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: python sync.py
