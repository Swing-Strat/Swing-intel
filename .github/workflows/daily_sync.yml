name: Daily Supabase Sync

on:
  schedule:
    # Triggers every single morning at 12:00 UTC (4:00 AM PST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual one-click testing inside GitHub anytime

# sync.py's TRUNCATE + reload is one transaction, committed once at the end.
# Two runs overlapping (e.g. a manual dispatch landing during the scheduled
# run) each do their own TRUNCATE, stepping on each other's transaction and
# leaving the tables in a partial state. cancel-in-progress ensures a new
# run always supersedes rather than races an old one.
concurrency:
  group: daily-supabase-sync
  cancel-in-progress: true

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install DB & Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    - name: Run Integrated Download and Sync Pipeline
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        # Without this, Python fully buffers stdout when it isn't attached to
        # a real terminal (true of GitHub Actions), so log lines don't show
        # up until the buffer fills or the script exits — the job can be
        # doing real work for many minutes while the log looks empty.
        PYTHONUNBUFFERED: '1'
      run: python sync.py
